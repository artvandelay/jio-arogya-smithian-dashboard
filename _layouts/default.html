<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>{{ page.title }} — Jio Arogya</title>
<style>
:root { --ink: #0f172a; --ink-2: #334155; --ink-3: #64748b; --paper: #fbfaf7; --line: #e2e8f0; --accent: #0369a1; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--paper); color: var(--ink); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; line-height: 1.65; }
body { max-width: 860px; margin: 0 auto; padding: 32px 28px 80px; }

.nav-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; margin-bottom: 28px; border-bottom: 2px solid var(--ink); font-size: 12px; }
.nav-bar a { color: var(--accent); text-decoration: none; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
.nav-bar a:hover { text-decoration: underline; }
.nav-bar .site { color: var(--ink-3); font-weight: 500; }

h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 6px; color: var(--ink); }
h2 { font-size: 20px; font-weight: 700; margin-top: 36px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--line); color: var(--ink); }
h3 { font-size: 16px; font-weight: 700; margin-top: 28px; margin-bottom: 8px; color: var(--ink); }
h4 { font-size: 14px; font-weight: 700; margin-top: 22px; margin-bottom: 6px; color: var(--ink-2); }

p { margin-bottom: 14px; color: var(--ink-2); }
ul, ol { margin-bottom: 14px; padding-left: 24px; color: var(--ink-2); }
li { margin-bottom: 6px; }
li > ul, li > ol { margin-top: 6px; margin-bottom: 0; }

strong { color: var(--ink); font-weight: 600; }
em { font-style: italic; }
code { background: #f1f5f9; padding: 2px 5px; border-radius: 3px; font-size: 13px; font-family: 'SF Mono', Menlo, Consolas, monospace; }
pre { background: #f1f5f9; padding: 16px; border-radius: 4px; overflow-x: auto; margin-bottom: 16px; font-size: 13px; line-height: 1.5; }
pre code { background: none; padding: 0; }
blockquote { border-left: 3px solid var(--accent); padding: 10px 16px; margin: 16px 0; background: #f0f9ff; color: var(--ink-2); font-size: 14px; }

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

hr { border: none; border-top: 1px solid var(--line); margin: 32px 0; }

table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
th { text-align: left; padding: 8px 10px; background: var(--ink); color: #fff; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
td { padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; color: var(--ink-2); line-height: 1.5; }
tr:hover td { background: #fafafa; }

.meta { font-size: 12px; color: var(--ink-3); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }

@media (max-width: 600px) {
  body { padding: 20px 16px 60px; }
  h1 { font-size: 22px; }
  table { font-size: 12px; }
}

@media print {
  body { max-width: 100%; padding: 0; }
  .nav-bar { display: none; }
}
</style>
</head>
<body>
<div id="_gate" style="display:none;position:fixed;inset:0;z-index:9999;background:#fbfaf7;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<div style="text-align:center;max-width:340px;padding:24px">
<div style="font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:#64748b;font-weight:700;margin-bottom:12px">Jio Arogya · Smithian Analysis</div>
<div style="font-size:15px;color:#334155;margin-bottom:20px">This site is access-restricted.<br>Please enter the password to continue.</div>
<input id="_pw" type="password" placeholder="Password" autofocus style="width:100%;padding:12px 14px;border:1px solid #e2e8f0;font-size:15px;font-family:inherit;margin-bottom:10px;outline:none">
<button id="_go" style="width:100%;padding:12px;background:#0f172a;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Enter</button>
<div id="_err" style="display:none;color:#b91c1c;font-size:12px;margin-top:10px">Incorrect password. Try again.</div>
</div>
</div>
<noscript><div style="padding:40px;text-align:center;font-family:sans-serif">JavaScript is required to view this site.</div></noscript>
<div id="_content" style="display:none">
<nav class="nav-bar">
  <a href="{{ '/' | relative_url }}">← Home</a>
  <span class="site">Jio Arogya · Smithian Analysis</span>
</nav>

{% if page.subtitle %}
<div class="meta">{{ page.subtitle }}</div>
{% endif %}

{{ content }}

</div>
<script src="{{ '/auth.js' | relative_url }}"></script>
</body>
</html>
